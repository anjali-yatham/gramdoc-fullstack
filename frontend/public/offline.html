<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GramDoc — Offline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,600&family=Mukta:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest: #0f3d2a;
            --mint: #7bcaa4;
            --cream: #fdf6ec;
            --sand: #f7f3ed;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--sand);
            font-family: 'Mukta', sans-serif;
            text-align: center;
            color: var(--forest);
        }
        .container {
            max-width: 400px;
            padding: 40px;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(15,61,42,0.08);
            border: 1px solid #e8d5bc;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: 32px;
            margin-bottom: 24px;
            color: var(--forest);
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        p {
            font-size: 14px;
            color: #6b5e50;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        button {
            background-color: var(--forest);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        .lang-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }
        .lang-text {
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">GramDoc</div>
        <div class="icon">📶</div>
        <h1>You are offline</h1>
        <p>Please check your internet connection and try again.</p>
        
        <div class="lang-section">
            <span class="lang-text">Hindi: <strong>आप ऑफलाइन हैं</strong></span>
            <span class="lang-text">Telugu: <strong>మీరు ఆఫ్లైన్లో ఉన్నారు</strong></span>
        </div>

        <button onclick="window.location.reload()">Retry Connection</button>
    </div>
</body>
</html>
